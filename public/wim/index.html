<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Undangan Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script defer src="template-engine.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">Master Template</p>
            <h1>Generator Undangan Digital</h1>
        </div>
        <div class="header-actions">
            <button type="button" class="icon-button" id="btn-import-json" title="Impor data JSON">
                <i class="fa-solid fa-file-import"></i>
            </button>
            <button type="button" class="icon-button" id="btn-download-json" title="Simpan data JSON">
                <i class="fa-solid fa-file-arrow-down"></i>
            </button>
            <button type="button" class="primary-button" id="btn-generate">
                <i class="fa-solid fa-box-archive"></i>
                Buat ZIP
            </button>
        </div>
    </header>

    <main class="app-shell">
        <form id="generator-form" class="form-panel" autocomplete="off">
            <section class="form-section">
                <h2>Pilihan Template</h2>
                <div class="grid two">
                    <label>
                        Template Desain
                        <select id="template-select" name="templateName">
                            <option value="template-floral1">Floral 1</option>
                            <option value="template-floral2">Floral 2</option>
                        </select>
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>Halaman</h2>
                <div class="toggle-grid">
                    <label class="toggle-card">
                        <input name="sections.profiles" type="checkbox">
                        <span>Profil Mempelai</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.quote" type="checkbox">
                        <span>Ayat / Quote</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.events" type="checkbox">
                        <span>Acara</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.loveStory" type="checkbox">
                        <span>Love Story</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.gift" type="checkbox">
                        <span>Wedding Gift</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.guestbook" type="checkbox">
                        <span>Ucapan & Doa</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.closing" type="checkbox">
                        <span>Penutup</span>
                    </label>
                    <label class="toggle-card">
                        <input name="sections.footer" type="checkbox">
                        <span>Footer Brand</span>
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>Identitas</h2>
                <div class="grid two">
                    <label>
                        Nama folder
                        <input name="projectName" type="text" required>
                    </label>
                    <label>
                        Nama tamu default
                        <input name="guestName" type="text">
                    </label>
                    <label>
                        Nama mempelai 1
                        <input name="brideName" type="text" required>
                    </label>
                    <label>
                        Nama mempelai 2
                        <input name="groomName" type="text" required>
                    </label>
                </div>
                <div class="grid two">
                    <label>
                        Orang tua mempelai 1
                        <textarea name="brideParents" rows="3"></textarea>
                    </label>
                    <label>
                        Orang tua mempelai 2
                        <textarea name="groomParents" rows="3"></textarea>
                    </label>
                    <label>
                        Instagram mempelai 1
                        <input name="brideInstagram" type="text">
                    </label>
                    <label>
                        Instagram mempelai 2
                        <input name="groomInstagram" type="text">
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>Tanggal Utama</h2>
                <div class="grid three">
                    <label>
                        Tanggal pernikahan
                        <input name="weddingDate" type="date" required>
                    </label>
                    <label>
                        Teks tanggal hero
                        <input name="weddingDateText" type="text">
                    </label>
                    <label>
                        Link musik
                        <input name="audioUrl" type="url">
                    </label>
                </div>
            </section>

            <section class="form-section">
                <div class="section-heading">
                    <h2>Acara</h2>
                    <button type="button" class="secondary-button" id="btn-add-event">
                        <i class="fa-solid fa-plus"></i>
                        Tambah Acara
                    </button>
                </div>
                <div class="repeat-list" id="events-editor"></div>
            </section>

            <section class="form-section">
                <div class="section-heading">
                    <h2>Love Story</h2>
                    <button type="button" class="secondary-button" id="btn-add-story">
                        <i class="fa-solid fa-plus"></i>
                        Tambah Cerita
                    </button>
                </div>
                <div class="repeat-list" id="stories-editor"></div>
            </section>

            <section class="form-section">
                <h2>Wedding Gift</h2>
                <div class="grid three">
                    <label>
                        WhatsApp konfirmasi
                        <input name="gift.whatsappNumber" type="tel">
                    </label>
                    <label>
                        Bank 1
                        <input name="gift.bank1.name" type="text">
                    </label>
                    <label>
                        Logo bank 1
                        <input name="gift.bank1.logoUrl" type="url">
                    </label>
                    <label>
                        No rekening 1
                        <input name="gift.bank1.number" type="text">
                    </label>
                    <label>
                        Atas nama 1
                        <input name="gift.bank1.owner" type="text">
                    </label>
                    <label>
                        Bank 2
                        <input name="gift.bank2.name" type="text">
                    </label>
                    <label>
                        Logo bank 2
                        <input name="gift.bank2.logoUrl" type="url">
                    </label>
                    <label>
                        No rekening 2
                        <input name="gift.bank2.number" type="text">
                    </label>
                    <label>
                        Atas nama 2
                        <input name="gift.bank2.owner" type="text">
                    </label>
                </div>
                <div class="grid two">
                    <label>
                        Alamat kado
                        <textarea name="gift.physicalAddress" rows="3"></textarea>
                    </label>
                    <label>
                        Penerima kado
                        <textarea name="gift.receiver" rows="3"></textarea>
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>Brand</h2>
                <div class="grid three">
                    <label>
                        Nama brand footer
                        <input name="brandName" type="text">
                    </label>
                    <label>
                        Instagram footer
                        <input name="footerInstagramUrl" type="url">
                    </label>
                    <label>
                        WhatsApp footer
                        <input name="footerWhatsappUrl" type="url">
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h2>Gambar</h2>
                <div class="image-grid">
                    <label class="file-tile">
                        <span>Foto mempelai 1</span>
                        <input id="image-brideImage" type="file" accept="image/*">
                    </label>
                    <label class="file-tile">
                        <span>Foto mempelai 2</span>
                        <input id="image-groomImage" type="file" accept="image/*">
                    </label>
                    <label class="file-tile">
                        <span>Foto pasangan</span>
                        <input id="image-coupleImage" type="file" accept="image/*">
                    </label>
                    <label class="file-tile">
                        <span>Logo</span>
                        <input id="image-logoImage" type="file" accept="image/*">
                    </label>
                    <label class="file-tile">
                        <span>Background bunga</span>
                        <input id="image-backgroundImage" type="file" accept="image/*">
                    </label>
                    <label class="file-tile">
                        <span>Floral kecil</span>
                        <input id="image-floralImage" type="file" accept="image/*">
                    </label>
                </div>
            </section>
        </form>

        <aside class="side-panel">
            <section class="summary-panel">
                <h2>Ringkasan</h2>
                <dl id="summary-list"></dl>
            </section>
            <section class="json-panel">
                <div class="panel-title-row">
                    <h2>Data JSON</h2>
                    <button type="button" class="text-button" id="btn-copy-json">
                        <i class="fa-regular fa-copy"></i>
                        Salin
                    </button>
                </div>
                <textarea id="json-output" spellcheck="false"></textarea>
            </section>
            <section class="status-panel" id="status-panel" aria-live="polite"></section>
        </aside>
    </main>

    <input id="json-import-input" type="file" accept="application/json,.json" hidden>
</body>
</html>
